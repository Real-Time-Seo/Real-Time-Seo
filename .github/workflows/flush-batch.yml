name: Batch Flush Timer
on:
  repository_dispatch:
    types: [flush-batch]

permissions:
  actions: write
  contents: read

jobs:
  flush:
    runs-on: ubuntu-latest
    steps:
      - name: Wait 10 seconds
        run: sleep 10

      - name: Flush pending batch
        env:
          FIREBASE_URL: ${{ secrets.FIREBASE_DB_URL }}
          GH_PAT: ${{ secrets.MY_PAT }}
        run: |
          BATCH=$(curl -s "$FIREBASE_URL/batch.json")

          if [ "$BATCH" = "null" ] || [ -z "$BATCH" ]; then
            echo "Batch already dispatched. Exiting."
            exit 0
          fi

          ITEMS=$(echo "$BATCH" | python3 -c "import sys,json; d=json.load(sys.stdin); print(json.dumps(d.get('items', {})))")

          if [ "$ITEMS" = "{}" ] || [ "$ITEMS" = "null" ]; then
            curl -s -X DELETE "$FIREBASE_URL/batch.json"
            exit 0
          fi

          curl -s -X DELETE "$FIREBASE_URL/batch.json"

          curl -s -X PATCH \
            -H "Content-Type: application/json" \
            -d "$ITEMS" \
            "$FIREBASE_URL/queue.json"

          curl -s -X POST \
            -H "Authorization: token $GH_PAT" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d '{"event_type":"run-audit"}' \
            "https://api.github.com/repos/Real-Time-Seo/Real-Time-Seo/dispatches"

          echo "Audit triggered."

      - name: Cleanup flush history
        if: always()
        run: |
          sleep 5
          gh run list --workflow "Batch Flush Timer" --status completed --limit 20 --json databaseId -q '.[].databaseId' | xargs -I {} gh run delete {} --repo ${{ github.repository }} || true
          gh run list --workflow "Batch Flush Timer" --status failure --limit 20 --json databaseId -q '.[].databaseId' | xargs -I {} gh run delete {} --repo ${{ github.repository }} || true
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
