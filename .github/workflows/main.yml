name: Lighthouse Engine
on:
  repository_dispatch:
    types: [run-audit]

permissions:
  actions: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Private Engine
        run: |
          git clone https://x-access-token:${{ secrets.MY_PAT }}@github.com/Real-Time-Seo/lighthouse-engine.git temp_dir
          mv temp_dir/* .
          rm -rf temp_dir

      - name: Start Analysis
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          MY_PAT: ${{ secrets.MY_PAT }}
        run: |
          npm install --no-package-lock --no-audit --no-fund
          node lighthouse-runner.js

      - name: Cleanup History
        if: always()
        run: |
          gh run delete ${{ github.run_id }} --repo ${{ github.repository }}
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
