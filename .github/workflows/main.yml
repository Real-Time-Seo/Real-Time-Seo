name: Lighthouse Engine
on:
  repository_dispatch:
    types: [run-audit]

permissions:
  actions: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Private Engine
        run: |
          git clone https://x-access-token:${{ secrets.MY_PAT }}@github.com/Real-Time-Seo/lighthouse-engine.git temp_dir
          mv temp_dir/* .
          rm -rf temp_dir

      - name: Start Analysis
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          npm install --no-package-lock --no-audit --no-fund
          node lighthouse-runner.js

      - name: Cleanup Previous History
        if: always()
        run: |
          gh run list --workflow "Lighthouse Engine" --status completed --limit 100 --json databaseId -q '.[].databaseId' | grep -v "${{ github.run_id }}" | xargs -I {} gh run delete {} --repo ${{ github.repository }} || true
          gh run list --workflow "Lighthouse Engine" --status failed --limit 100 --json databaseId -q '.[].databaseId' | grep -v "${{ github.run_id }}" | xargs -I {} gh run delete {} --repo ${{ github.repository }} || true
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
