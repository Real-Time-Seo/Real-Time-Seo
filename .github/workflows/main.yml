name: Lighthouse Engine
on:
  repository_dispatch:
    types: [run-audit]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Public Repo
        uses: actions/checkout@v4

      - name: Clone Private Logic
        run: |
          git clone https://x-access-token:${{ secrets.MY_PAT }}@github.com/YOUR_GITHUB_USERNAME/lighthouse-logic.git temp_dir
          mv temp_dir/* .
          rm -rf temp_dir

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install
        run: npm install

      - name: Run Batch
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
          AUDIT_PAYLOAD: ${{ JSON.stringify(github.event.client_payload.batch) }}
        run: node lighthouse-runner.js
