name: Lighthouse Engine
on:
  repository_dispatch:
    types: [run-audit]

permissions:
  actions: write
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Clone Private Engine
        run: |
          git clone https://x-access-token:${{ secrets.MY_PAT }}@github.com/Real-Time-Seo/lighthouse-engine.git temp_dir
          mv temp_dir/* .
          rm -rf temp_dir

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Cache Node Modules
        id: cache-npm
        uses: actions/cache@v4
        with:
          path: node_modules
          key: npm-cache-${{ hashFiles('package.json') }}
          restore-keys: |
            npm-cache-

      - name: Install Dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm install --no-package-lock --no-audit --no-fund

      - name: Start Analysis
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: node lighthouse-runner.js

      - name: Cleanup History
        if: always()
        run: |
          sleep 5
          CURRENT_RUN=${{ github.run_id }}

          gh run list --workflow "Lighthouse Engine" --status completed --limit 20 --json databaseId \
            -q '.[].databaseId' | grep -v "^${CURRENT_RUN}$" | \
            xargs -I {} gh run delete {} --repo ${{ github.repository }} || true

          gh run list --workflow "Lighthouse Engine" --status failure --limit 20 --json databaseId \
            -q '.[].databaseId' | grep -v "^${CURRENT_RUN}$" | \
            xargs -I {} gh run delete {} --repo ${{ github.repository }} || true
        env:
          GH_TOKEN: ${{ secrets.MY_PAT }}
